<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Your Seat · Francisca & Guilherme</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-dataset="data/guests-28mar.json" class="theme-noviciado">
    <div class="backdrop"></div>
    <main class="layout">
      <section class="hero-card">
        <p class="script-tag">Find your seat</p>
        <h1>Francisca &amp; Guilherme</h1>
        <p class="event-meta">Noviciado · 28 de marzo 2026 · Santiago, Chile</p>
        <form id="search-form" autocomplete="off">
          <label for="query">Ingresa tu nombre</label>
          <input
            id="query"
            name="query"
            type="search"
            placeholder="Ej: Ana María Rojas"
            spellcheck="false"
            autocomplete="off"
            required
          />
          <button type="submit">Buscar mesa</button>
        </form>
      </section>

      <section class="results-panel">
        <div id="results" aria-live="polite"></div>
        <div class="floorplan-card">
          <h2>Plano del salón</h2>
          <p>La burbuja indica la mesa del último resultado.</p>
          <div class="floorplan-frame">
            <img src="assets/noviciado-28mar.png" alt="Plano general Noviciado 28 de marzo" />
            <span id="floorplan-highlight" class="floorplan-highlight" hidden></span>
          </div>
          <a class="floorplan-link" href="assets/noviciado-28mar.png" target="_blank" rel="noopener">Abrir en pantalla completa</a>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>

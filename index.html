<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Your Seat · Lola & Juan Ignacio</title>
    <link rel="stylesheet" href="style.css?v=20260326" />
  </head>
  <body data-dataset="data/guests-28mar.json" class="theme-noviciado">
    <div class="backdrop"></div>
    <main class="layout">
      <section class="hero-card invite-card">
        <div class="floral-header" aria-hidden="true"></div>
        <p class="tagline">¡Nos casamos!</p>
        <div class="names">
          <span>Lola</span>
          <span class="ampersand">&amp;</span>
          <span>Juan Ignacio</span>
        </div>
        <p class="intro-text">Queremos que vivas este día con nosotros. Encuentra tu mesa para la cena y prepárate para celebrar.</p>
        <div class="date-block">
          <div class="month">Marzo</div>
          <div class="date-grid">
            <div>
              <span class="label">Sábado</span>
            </div>
            <div class="day">28</div>
            <div>
              <span class="label">19:30 hrs</span>
            </div>
          </div>
          <div class="year">Dos mil veintiséis · Noviciado, Santiago</div>
        </div>
        <div class="divider"></div>
        <form id="search-form" autocomplete="off">
          <label for="query">Ingresa tu nombre para ubicar tu mesa</label>
          <input
            id="query"
            name="query"
            type="search"
            placeholder="Ej: Ana María Rojas"
            spellcheck="false"
            autocomplete="off"
            required
          />
          <button type="submit">Buscar mesa</button>
        </form>
      </section>

      <section class="results-panel">
        <div id="results" aria-live="polite"></div>
        <div class="floorplan-card">
          <h2>Plano del salón</h2>
          <p>La burbuja indica la mesa del último resultado.</p>
          <div class="floorplan-frame">
            <img src="assets/noviciado-28mar.png" alt="Plano general Noviciado 28 de marzo" />
            <span id="floorplan-highlight" class="floorplan-highlight" hidden></span>
          </div>
          <a class="floorplan-link" href="assets/noviciado-28mar.png" target="_blank" rel="noopener">Abrir en pantalla completa</a>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encuentra tu mesa · Sofía &amp; Clemente</title>
    <link rel="stylesheet" href="style.css?v=20260411" />
  </head>
  <body data-dataset="data/guests-sofia-clemente.json" class="theme-noviciado">
    <div class="backdrop"></div>
    <main class="layout">
      <section class="hero-card invite-card">
        <p class="script-tag">Alto Noviciado · 11 de abril</p>
        <h1>Matrimonio Sofía &amp; Clemente</h1>
        <p class="intro-text">
          Ingresa tu nombre o apellido tal como aparece en la invitación y descubre tu mesa.
        </p>
        <form id="search-form" autocomplete="off">
          <label for="query">Nombre o apellido</label>
          <input
            id="query"
            name="query"
            type="search"
            placeholder="Ej: Juan Pablo Achondo"
            spellcheck="false"
            autocomplete="off"
            required
          />
          <button type="submit">Buscar mesa</button>
          <small>* Búsqueda sin tildes ni necesidad de mayúsculas.</small>
        </form>
      </section>

      <section class="results-panel">
        <div id="results" aria-live="polite"></div>
        <div class="floorplan-card">
          <h2>Plano del salón</h2>
          <p>La burbuja marcará la mesa del último resultado.</p>
          <div class="floorplan-frame">
            <img src="assets/noviciado-11abr.jpg" alt="Plano general Alto Noviciado" />
            <span id="floorplan-highlight" class="floorplan-highlight" hidden>
              <span class="floorplan-tip">Mesa</span>
              <span class="floorplan-ring"><span class="floorplan-number">—</span></span>
            </span>
          </div>
          <a class="floorplan-link" href="assets/noviciado-11abr.png" target="_blank" rel="noopener"
            >Abrir en pantalla completa</a
          >
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
